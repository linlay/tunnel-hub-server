name: tunnel-hub

services:
  server:
    image: tunnel-hub-server
    container_name: tunnel-hub-server
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      RELAY_ADDR: ":8080"
      RELAY_DB_PATH: "/data/tunnel.db"
      DESKTOP_PUBLIC_BASE_DOMAIN: "m.zenmind.cc"
      WEBAPP_PUBLIC_BASE_DOMAIN: "wa.zenmind.cc"
      SSO_JWT_PUBLIC_KEY_FILE: "/configs/jwt-public.pem"
    ports:
      - "8080:8080"
    volumes:
      - relay-data:/data
      - ./configs:/configs:ro

  public:
    image: tunnel-hub-public
    container_name: tunnel-hub-public
    build:
      context: ./tunnel-hub-public
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${TUNNEL_HUB_PUBLIC_PORT:-11965}:80"
    restart: unless-stopped

volumes:
  relay-data:
    name: tunnel-hub-server_relay-data
