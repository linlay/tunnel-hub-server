name: tunnel-hub

services:
  server:
    image: tunnel-hub-server
    container_name: tunnel-hub-server
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      RELAY_ADDR: ":8080"
      RELAY_DB_PATH: "/data/zenmind-tunnel.db"
      SSO_JWT_PUBLIC_KEY_FILE: "/run/secrets/zenmind-sso-jwt-public.pem"
    ports:
      - "8080:8080"
    volumes:
      - relay-data:/data
      - ./.local/sso-jwt-public.pem:/run/secrets/zenmind-sso-jwt-public.pem:ro

volumes:
  relay-data:
    name: tunnel-hub-server_relay-data
