name: tunnel-hub

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      RELAY_ADDR: ":8080"
      RELAY_DB_PATH: "/data/zenmind-tunnel.db"
    ports:
      - "8080:8080"
    volumes:
      - relay-data:/data

volumes:
  relay-data:
    name: tunnel-hub-server_relay-data
