map $http_upgrade $tunnel_hub_connection_upgrade {
    default upgrade;
    "" close;
}

map "$host:$http_upgrade" $tunnel_hub_desktop_public_backend {
    ~^[^.]+-[0-9]+\.m\.zenmind\.cc: http://127.0.0.1:11961;
    ~^.+:.+$ http://127.0.0.1:11961;
    default http://127.0.0.1:11965;
}

server {
    listen 443 ssl http2;
    server_name tunnel-hub.zenmind.cc;

    ssl_certificate /etc/letsencrypt/live/tunnel-hub.zenmind.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tunnel-hub.zenmind.cc/privkey.pem;

    client_max_body_size 100m;

    location = /tunnel {
        proxy_pass http://127.0.0.1:11961;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $tunnel_hub_connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /api/admin {
        proxy_pass http://127.0.0.1:11961;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/admin/ {
        proxy_pass http://127.0.0.1:11961;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/desktop {
        proxy_pass http://127.0.0.1:11961;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/desktop/ {
        proxy_pass http://127.0.0.1:11961;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/upload {
        return 404;
    }

    location = /api/resource {
        return 404;
    }

    location = /api/download {
        return 404;
    }

    location ^~ /api/download/ {
        return 404;
    }

    location /api/pull/ {
        proxy_pass http://127.0.0.1:11961;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/push/ {
        proxy_pass http://127.0.0.1:11961;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://127.0.0.1:11963;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl http2;
    server_name m.zenmind.cc *.m.zenmind.cc;

    ssl_certificate /etc/letsencrypt/live/m.zenmind.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/m.zenmind.cc/privkey.pem;

    client_max_body_size 100m;

    location = /api/upload {
        proxy_pass http://127.0.0.1:11961;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    location = /api/resource {
        proxy_pass http://127.0.0.1:11961;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    location /api/pull/ {
        proxy_pass http://127.0.0.1:11961;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/download {
        return 404;
    }

    location ^~ /api/download/ {
        return 404;
    }

    location /api/push/ {
        proxy_pass http://127.0.0.1:11961;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass $tunnel_hub_desktop_public_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $tunnel_hub_connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

server {
    listen 443 ssl http2;
    server_name wa.zenmind.cc *.wa.zenmind.cc;

    ssl_certificate /etc/letsencrypt/live/wa.zenmind.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wa.zenmind.cc/privkey.pem;

    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:11961;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $tunnel_hub_connection_upgrade;
        proxy_buffering off;
