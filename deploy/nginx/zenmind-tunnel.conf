server {
    listen 443 ssl http2;
    server_name admin.tunnel-hub.zenmind.cc *.tunnel-hub.zenmind.cc;

    ssl_certificate /etc/letsencrypt/live/tunnel-hub.zenmind.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tunnel-hub.zenmind.cc/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name admin.tunnel-hub.zenmind.cc *.tunnel-hub.zenmind.cc;
    return 301 https://$host$request_uri;
}
